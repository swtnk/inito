name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint, format, typecheck, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project (dev extras)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src
      - name: Pytest with coverage
        run: uv run pytest --cov-report=html
      - name: Build docs (warnings-as-errors)
        if: matrix.python-version == '3.13'
        run: uv run sphinx-build -b html docs docs/_build -W
      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov

  interop:
    name: framework interop (pydantic, sqlalchemy, django)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
      - name: Install project (dev + interop extras)
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,interop]"
      - name: Framework interop tests
        run: uv run pytest tests/integration/test_framework_interop.py -v --no-cov

  examples:
    name: framework examples (fastapi, aiohttp, sanic, django, redis, ...)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
      - name: Install project (dev + examples extras)
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,examples]"
      - name: Example smoke tests
        run: uv run pytest examples/di -v --no-cov

  pyright:
    name: stub generator end-to-end (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
      - name: Install project (dev extras) + pyright
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]" pyright
      - name: inito-stubgen + pyright end-to-end
        run: uv run pytest tests/stubs -v --no-cov

  build:
    name: build sdist and wheel
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - name: Build
        run: uv build
      - name: Check metadata with twine
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
