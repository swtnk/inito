name: Docs

# Build the Sphinx docs and publish them to GitHub Pages. Because the
# account's user site (swtnk.github.io) has the custom domain
# swetanksubham.com, this project site is served at
# https://swetanksubham.com/inito/ automatically — no CNAME file is needed
# in this repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - name: Install project (dev extras)
        run: |
          uv venv --python 3.13
          uv pip install -e ".[dev]"
      - name: Build docs (warnings-as-errors)
        run: uv run sphinx-build -b html docs docs/_build -W
      - name: Disable Jekyll (keep _static/_sources dirs)
        run: touch docs/_build/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
